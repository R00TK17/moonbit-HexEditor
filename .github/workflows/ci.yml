name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install GCC
        run: sudo apt update && sudo apt install -y gcc

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check (type-check)
        run: moon check --target native

      - name: Build (native)
        run: moon build --target native

      - name: Build (wasm-gc)
        run: moon build --target wasm-gc cmd/wasm

      - name: Test
        run: moon test --target native

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Install MoonBit
        shell: powershell
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Check (type-check)
        run: moon check --target native

      - name: Build (native)
        run: moon build --target native

      - name: Build (wasm-gc)
        run: moon build --target wasm-gc cmd/wasm

      - name: Test
        run: moon test --target native
