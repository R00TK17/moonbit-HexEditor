run-name: 'CI'
name: 'CI'
jobs:
  actions:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash         # Windows 上也统一用 bash（需 Git Bash）
    steps:
      - uses: actions/checkout@v5

      # --- GCC 安装（按平台区分）---
      - name: 'Install GCC (Linux)'
        if: runner.os == 'Linux'
        run: 'sudo apt update && sudo apt install -y gcc'

      - name: 'Setup MSYS2 and GCC (Windows)'
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          location: C:\msys64

      - name: 'Add GCC to PATH (Windows)'
        if: runner.os == 'Windows'
        run: 'echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH'

      # --- MoonBit 安装（按平台区分）---
      - name: 'Install MoonBit (Linux)'
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: 'Install MoonBit (Windows)'
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # --- 公共步骤（跨平台）---
      - name: 'Install dependencies'
        run: 'moon update'

      - name: 'Check (type-check)'
        run: 'moon check'

      - name: 'Format check'
        run: 'moon fmt --check'

      - name: 'Info & diff check'
        run: |
          moon info
          git diff --exit-code

      - name: 'Build (native)'
        run: 'moon build --target native'

      - name: 'Build (wasm-gc)'
        run: 'moon build --target wasm-gc cmd/wasm'

      - name: 'Test'
        run: 'moon test'