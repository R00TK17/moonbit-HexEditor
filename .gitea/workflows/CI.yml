name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install GCC
        run: sudo apt update && sudo apt install -y gcc

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: moon update

      - name: Check (type-check)
        run: moon check

      - name: Format check
        run: moon fmt --check

      - name: Info & diff check
        run: |
          moon info
          git diff --exit-code

      - name: Build (native)
        run: moon build --target native

      - name: Build (wasm-gc)
        run: moon build --target wasm-gc cmd/wasm

      - name: Test
        run: moon test

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          location: C:\msys64

      - name: Add GCC to PATH
        run: echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH

      - name: Install MoonBit
        shell: powershell
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: moon update

      - name: Check (type-check)
        run: moon check

      - name: Format check
        run: moon fmt --check

      - name: Info & diff check
        run: |
          moon info
          git diff --exit-code

      - name: Build (native)
        run: moon build --target native

      - name: Build (wasm-gc)
        run: moon build --target wasm-gc cmd/wasm

      - name: Test
        run: moon test