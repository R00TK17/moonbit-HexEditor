run-name: 'CI - Windows'
name: 'CI - Windows'
jobs:
  actions:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash                   # 全程使用 Git Bash，避免 PowerShell 问题
    steps:
      - uses: actions/checkout@v5

      # 直接使用 Git for Windows 自带的 GCC（绝大多数运行器已包含）
      - name: 'Setup GCC'
        run: 'echo "C:/Program Files/Git/mingw64/bin" >> $GITHUB_PATH'

      # MoonBit 通过 bash 安装脚本，稳定可靠
      - name: 'Install MoonBit'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: 'Install dependencies'
        run: 'moon update'

      - name: 'Check (type-check)'
        run: 'moon check'

      - name: 'Format check'
        run: 'moon fmt --check'

      - name: 'Info & diff check'
        run: |
          moon info
          git diff --exit-code

      - name: 'Build (native)'
        run: 'moon build --target native'

      - name: 'Build (wasm-gc)'
        run: 'moon build --target wasm-gc cmd/wasm'

      - name: 'Test'
        run: 'moon test'