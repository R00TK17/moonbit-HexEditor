run-name: 'CI-linux'
name: 'CI-linux'
jobs:
  actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 'Install GCC'
        run: 'sudo apt update && sudo apt install -y gcc'

      - name: 'Install MoonBit'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: 'Install dependencies'
        run: 'moon update'

      - name: 'Check (type-check)'
        run: 'moon check'

      - name: 'Format check'
        run: 'moon fmt --check'

      - name: 'Info & diff check'
        run: |
          moon info
          git diff --exit-code

      - name: 'Build (native)'
        run: 'moon build --target native'

      - name: 'Build (wasm-gc)'
        run: 'moon build --target wasm-gc cmd/wasm'

      - name: 'Test'
        run: 'moon test'